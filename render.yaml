services:
  - type: web
    name: proinvestai-api
    env: docker
    region: oregon # Pode alterar a região se desejar
    plan: free # Pode ser alterado para starter, standard, etc.
    branch: main
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: proinvestai-db
          property: connectionString
      - key: APP_NAME
        value: "ProInvestAI"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: BRAPI_TOKEN
        sync: false
      - key: BCB_API_URL
        value: "https://api.bcb.gov.br/dados/serie/bcdata.sgs"

databases:
  - name: proinvestai-db
    databaseName: proinvestai
    user: postgres
    region: oregon
    plan: free
