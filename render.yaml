services:
  - type: web
    name: proinvestai-api
    env: docker
    region: oregon
    plan: free
    branch: main
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        # Set this manually in Render Dashboard:
        # postgresql+asyncpg://postgres.yfgwxtpcivpccnzpzmcn:<PASSWORD>@aws-1-us-west-2.pooler.supabase.com:5433/postgres
        sync: false
      - key: APP_NAME
        value: "ProInvestAI"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: BRAPI_TOKEN
        sync: false
      - key: BCB_API_URL
        value: "https://api.bcb.gov.br/dados/serie/bcdata.sgs"

# NOTE: Database is hosted on Supabase (external).
# No Render-managed database needed.
# Set DATABASE_URL manually in the Render Dashboard Environment tab.
