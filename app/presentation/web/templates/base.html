<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProInvestAI - Inteligência Financeira Profissional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Sidebar/Navbar base styles */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            margin-top: 5rem;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <header class="nav-header">
        <div class="logo">ProInvestAI</div>
        <nav>
            <a href="/dashboard" class="btn" style="color: var(--text-dim)">Dashboard</a>
            <a href="/quiz" class="btn btn-primary">Novo Quiz</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer style="padding: 4rem 2rem; text-align: center; color: var(--text-dim); font-size: 0.875rem;">
        &copy; 2026 ProInvestAI. Desenvolvido com Clean Architecture & IA.
    </footer>
</body>
</html>
