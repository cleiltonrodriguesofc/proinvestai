{% extends "base.html" %}

{% block title %}Login - ProInvestAI{% end block %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 5rem auto; padding: 2rem;">
    <h2 class="text-center" style="margin-bottom: 1.5rem;">Acessar sua Conta</h2>
    
    {% if error %}
    <div style="background-color: rgba(255, 99, 132, 0.2); color: #ff6b81; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
        {{ error }}
    </div>
    {% endif %}
    
    <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
        <div>
            <label for="email" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email</label>
            <input type="email" id="email" name="email" required 
                style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;">
        </div>
        
        <div>
            <label for="password" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Senha</label>
            <input type="password" id="password" name="password" required 
                style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;">
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Entrar</button>
    </form>
    
    <p class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        Ainda não tem conta? <a href="/register" style="color: var(--primary-color);">Crie uma grátis</a>
    </p>
</div>
{% end block %}
