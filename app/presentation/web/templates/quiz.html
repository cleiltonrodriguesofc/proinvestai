{% extends "base.html" %}

{% block content %}
<div class="quiz-container animate-fade-in">
    <div id="quiz-header" style="margin-bottom: 2rem;">
        <h2 id="section-title">Análise de Perfil</h2>
        <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 1rem;">
            <div id="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(to right, var(--primary), var(--secondary)); border-radius: 3px; transition: width 0.3s ease;"></div>
        </div>
        <p id="progress-text" style="color: var(--text-dim); font-size: 0.875rem; margin-top: 0.5rem;">Pergunta 1 de 28</p>
    </div>

    <div id="question-card" class="glass-card">
        <h3 id="question-text" style="margin-bottom: 2rem; -webkit-text-fill-color: white;">Carregando pergunta...</h3>
        <div id="options-container">
            <!-- Options will be injected here -->
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 2rem;">
            <button id="prev-btn" class="btn" style="color: var(--text-dim); display: none;">Anterior</button>
            <button id="next-btn" class="btn btn-primary" style="margin-left: auto;">Próxima</button>
        </div>
    </div>

    <div id="result-card" class="glass-card" style="display: none; text-align: center;">
        <h2>Seu Perfil: <span id="profile-result" style="-webkit-text-fill-color: var(--secondary);">...</span></h2>
        <p style="color: var(--text-dim); margin-top: 1rem;">Com base em suas respostas, identificamos que você tem uma tolerância ao risco adequada para estratégias de <span id="strategy-suggestion">...</span>.</p>
        
        <div style="margin: 3rem 0;">
            <div id="score-circle" style="width: 120px; height: 120px; border-radius: 60px; border: 8px solid var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 2rem; font-weight: 800;">
                <span id="total-score">0</span>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-dim); margin-top: 0.5rem;">Pontuação Total (SGS/CEA)</p>
        </div>

        <button onclick="window.location.href='/dashboard'" class="btn btn-primary">Ver Minha Carteira Ideal</button>
    </div>
</div>

<script>
    const questions = {{ questions_json | safe }};
    let currentStep = 0;
    const answers = {};

    function updateUI() {
        const q = questions[currentStep];
        const progress = ((currentStep + 1) / questions.length) * 100;
        
        document.getElementById('progress-bar').style.width = `${progress}%`;
        document.getElementById('progress-text').innerText = `Pergunta ${currentStep + 1} de ${questions.length}`;
        document.getElementById('section-title').innerText = q.section.toUpperCase().replace('_', ' ');
        document.getElementById('question-text').innerText = q.text;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = `quiz-option ${answers[q.id] === opt.id ? 'active' : ''}`;
            div.innerText = opt.text;
            div.onclick = () => selectOption(q.id, opt.id);
            container.appendChild(div);
        });

        document.getElementById('prev-btn').style.display = currentStep > 0 ? 'block' : 'none';
        document.getElementById('next-btn').innerText = currentStep === questions.length - 1 ? 'Finalizar' : 'Próxima';
    }

    function selectOption(qId, optId) {
        answers[qId] = optId;
        updateUI();
    }

    document.getElementById('next-btn').onclick = async () => {
        if (!answers[questions[currentStep].id]) {
            alert('Por favor, selecione uma opção.');
            return;
        }

        if (currentStep < questions.length - 1) {
            currentStep++;
            updateUI();
        } else {
            submitQuiz();
        }
    };

    document.getElementById('prev-btn').onclick = () => {
        if (currentStep > 0) {
            currentStep--;
            updateUI();
        }
    };

    async function submitQuiz() {
        document.getElementById('question-card').style.display = 'none';
        document.getElementById('quiz-header').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
        
        // Mocking the result for now, in a real app we'd POST to /api/quiz
        const score = Object.values(answers).length * 3; // Mock logic
        document.getElementById('total-score').innerText = score;
        
        let profile = "Moderado";
        if (score < 45) profile = "Conservador";
        if (score > 85) profile = "Arrojado";
        
        document.getElementById('profile-result').innerText = profile;
        document.getElementById('strategy-suggestion').innerText = 
            profile === "Conservador" ? "Preservação de Capital" : 
            profile === "Moderado" ? "Crescimento Equilibrado" : "Maximização de Retorno";
    }

    updateUI();
</script>
{% endblock %}
