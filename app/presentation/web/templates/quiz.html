{% extends "base.html" %}

{% block title %}Análise de Perfil Institucional - ProInvestAI{% endblock %}

{% block content %}
<style>
    .quiz-layout {
        max-width: 800px;
        margin: 4rem auto;
        padding: 0 5%;
        min-height: calc(100vh - 120px);
        display: flex;
        flex-direction: column;
    }
    
    .quiz-header {
        margin-bottom: 3rem;
    }
    
    .quiz-section-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--accent-primary);
        font-weight: 700;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .progress-track {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 0.5rem;
    }
    
    .progress-bar {
        height: 100%;
        background: var(--accent-gradient);
        border-radius: 10px;
        transition: width var(--transition-smooth);
    }
    
    .progress-text {
        font-size: 0.85rem;
        color: var(--text-secondary);
        text-align: right;
    }
    
    .question-box {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 3rem;
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-blur);
    }
    
    .question-text {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 2rem;
        line-height: 1.4;
    }
    
    .options-grid {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    
    .option-card {
        position: relative;
        display: flex;
        align-items: center;
        padding: 1.25rem 1.5rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        cursor: pointer;
        transition: all var(--transition-fast);
    }
    
    .option-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
    }
    
    .option-card input[type="radio"] {
        position: absolute;
        opacity: 0;
    }
    
    .option-indicator {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--text-secondary);
        margin-right: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all var(--transition-fast);
    }
    
    .option-indicator::after {
        content: '';
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-primary);
        transform: scale(0);
        transition: transform var(--transition-fast);
    }
    
    .option-card input[type="radio"]:checked + .option-indicator {
        border-color: var(--accent-primary);
    }
    
    .option-card input[type="radio"]:checked + .option-indicator::after {
        transform: scale(1);
    }
    
    .option-card:has(input[type="radio"]:checked) {
        background: rgba(0, 242, 254, 0.05);
        border-color: var(--accent-primary);
    }
    
    .option-label {
        font-size: 1.05rem;
        color: var(--text-primary);
        font-weight: 500;
        user-select: none;
    }
    
    .quiz-footer {
        display: flex;
        justify-content: flex-end;
        margin-top: 2rem;
    }
    
    @media (max-width: 768px) {
        .question-box { padding: 2rem 1.5rem; }
        .question-text { font-size: 1.25rem; }
    }
</style>

<div class="quiz-layout animate-fade-in">
    <div class="quiz-header">
        <div class="quiz-section-title">
            <span>●</span> {{ section_name }}
        </div>
        <div class="progress-track">
            <div class="progress-bar" style="width: {{ (current_question / total_questions) * 100 }}%;"></div>
        </div>
        <div class="progress-text">Mapeamento {{ current_question }} de {{ total_questions }}</div>
    </div>
    
    <form action="/quiz" method="POST">
        <div class="question-box">
            <h2 class="question-text">{{ question_text }}</h2>
            
            <div class="options-grid">
                {% for option in options %}
                <label class="option-card">
                    <input type="radio" name="answer_id" value="{{ loop.index0 }}" required>
                    <div class="option-indicator"></div>
                    <span class="option-label">{{ option.text }}</span>
                </label>
                {% endfor %}
            </div>
            
            <div class="quiz-footer">
                <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem;">Avançar Diretriz</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
